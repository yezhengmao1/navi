<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tmux-web-bridge</title>
  <!-- Data-URI favicon: keeps the navi logo visible in the tab without
       adding a new route the auth middleware would have to punch through. -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><defs><radialGradient id='c' cx='42%25' cy='38%25' r='55%25'><stop offset='0%25' stop-color='%23ffffff'/><stop offset='35%25' stop-color='%23d8f2ff'/><stop offset='70%25' stop-color='%237ecef4'/><stop offset='100%25' stop-color='%233a9fd8'/></radialGradient></defs><path d='M82 90 Q58 50 18 22 Q10 28 14 42 Q20 62 38 80 Q56 94 82 98Z' fill='%23a8e6ff'/><path d='M118 90 Q142 50 182 22 Q190 28 186 42 Q180 62 162 80 Q144 94 118 98Z' fill='%23a8e6ff'/><path d='M82 110 Q56 126 24 162 Q20 170 30 164 Q50 146 68 128 Q80 114 83 110Z' fill='%23a8e6ff'/><path d='M118 110 Q144 126 176 162 Q180 170 170 164 Q150 146 132 128 Q120 114 117 110Z' fill='%23a8e6ff'/><circle cx='100' cy='100' r='22' fill='url(%23c)'/></svg>">
  <style>
    :root {
      color-scheme: light;
      /* Warm Solarized-light-inspired palette for higher contrast. */
      --bg:             #f5ead0;   /* sidebar / page bg */
      --bg-elev:        #fdf6e3;   /* elevated surfaces */
      --border:         #d8c6a0;
      --border-strong:  #b89e6d;
      --text:           #3a2e1f;   /* dark warm brown */
      --text-dim:       #7a6850;
      --accent:         #cb4b16;   /* burnt orange */
      --accent-soft:    #fbe3c8;
      --term-bg:        #fdf6e3;
      --term-fg:        #3a2e1f;
    }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; height: 100vh; overflow: hidden;
    }
    #sidebar {
      width: 280px; min-width: 280px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      background: var(--bg-elev);
    }
    #sidebar header {
      padding: 14px 14px 10px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    #sidebar header h1 { font-size: 13px; font-weight: 600; margin: 0; color: var(--text-dim); letter-spacing: 0.04em; text-transform: uppercase; }
    #sidebar header .head-right { display: flex; gap: 8px; align-items: center; }
    #conn { font-size: 11px; color: var(--text-dim); }
    /* Brand mark in the sidebar header — the navi crystal-wings svg.
       Sized to sit flush with the "Claude Panes" title. */
    #sidebar header .logo {
      width: 26px; height: 26px; flex: 0 0 auto;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.08));
    }
    #sidebar header .head-left {
      display: flex; align-items: center; gap: 8px; min-width: 0;
    }
    /* Toolbar-scoped styling for the re-homed NEW / DELETE buttons. */
    #toolbar #new-pane-btn {
      background: var(--accent); color: #fff; border-color: var(--accent);
      font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    }
    #toolbar #new-pane-btn:hover { background: #a33c0d; border-color: #a33c0d; }
    #toolbar #new-pane-btn:disabled { background: #cbd0dc; color: #eef0f5; border-color: #cbd0dc; cursor: not-allowed; }
    #toolbar #kill-btn {
      background: var(--bg); color: var(--accent); border-color: var(--accent);
      font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    }
    #toolbar #kill-btn:hover { background: var(--accent); color: #fff; }
    #toolbar #kill-btn:disabled { background: #f1f2f5; color: #aaa; border-color: var(--border); cursor: not-allowed; }
    #modal-backdrop {
      position: fixed; inset: 0; background: rgba(20, 24, 35, 0.35);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    #modal-backdrop.open { display: flex; }
    #modal {
      background: #fff; border-radius: 10px; padding: 18px 20px 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      width: 420px; max-width: 90vw;
      display: flex; flex-direction: column; gap: 12px;
    }
    #modal h2 { margin: 0; font-size: 15px; font-weight: 600; }
    #modal label { font-size: 12px; color: var(--text-dim); display: flex; flex-direction: column; gap: 4px; }
    #modal input, #modal select {
      padding: 8px 10px; font-size: 13px; border: 1px solid var(--border-strong);
      border-radius: 6px; outline: none; font-family: ui-monospace, monospace;
    }
    #modal input:focus, #modal select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
    #modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
    #modal button {
      padding: 6px 14px; border-radius: 5px; font-size: 12px; cursor: pointer;
      border: 1px solid var(--border-strong); background: #fff; font-weight: 500;
    }
    #modal button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    #modal button.primary:hover { background: #a33c0d; }
    #modal .error { color: #dc2626; font-size: 12px; min-height: 16px; }
    #conn.ok  { color: #16a34a; }
    #conn.err { color: #dc2626; }
    #panes-list { flex: 1; overflow-y: auto; }
    .pane-item {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .pane-item:hover { background: #f0e2c2; }
    .pane-item.active { background: var(--accent-soft); border-left: 3px solid var(--accent); padding-left: 11px; }
    .pane-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; gap: 6px; }
    .pane-proj {
      font-weight: 600; color: var(--text); font-size: 13px;
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .pane-proj[contenteditable="true"] {
      outline: 1px dashed var(--accent);
      background: #fff; cursor: text; overflow: visible; text-overflow: clip;
    }
    .pane-state {
      font-size: 11px; padding: 2px 6px; border-radius: 3px;
      background: #e5e7eb; color: #4b5563;
      position: relative;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .pane-state.state-idle     { color: #166534; background: #dcfce7; }
    .pane-state.state-thinking { color: #854d0e; background: #fef9c3; }
    .pane-state.state-tool_use { color: #155e75; background: #cffafe; }
    .pane-state.state-pending  { color: #9a3412; background: #ffedd5; font-weight: 600; }
    .pane-state.state-error    { color: #991b1b; background: #fee2e2; }
    /* Pending-approval attention: pulse ring + a soft glowing dot on the
       badge, plus a gentle row-level wash. Calm, not alarmy. */
    .pane-state.state-pending::before {
      content: ""; position: absolute; inset: 0; border-radius: inherit;
      box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.55);
      animation: pending-pulse 1.6s ease-out infinite;
      pointer-events: none;
    }
    .pane-state.state-pending::after {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: #ea580c; flex: none;
      animation: pending-dot 1.6s ease-in-out infinite;
    }
    @keyframes pending-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0.55); }
      70%  { box-shadow: 0 0 0 10px rgba(234, 88, 12, 0); }
      100% { box-shadow: 0 0 0 0 rgba(234, 88, 12, 0); }
    }
    @keyframes pending-dot {
      0%, 100% { opacity: 0.4; transform: scale(0.85); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    .pane-item.has-pending {
      animation: pending-row 2.4s ease-in-out infinite;
    }
    .pane-item.has-pending.active { animation: none; }
    @keyframes pending-row {
      0%, 100% { background: transparent; }
      50%      { background: rgba(234, 88, 12, 0.08); }
    }
    /* Bell stays pinned to the viewport at all times so it's always
       draggable / reachable. Idle look: muted greys, no animation, count
       hidden. The .visible class (applied when at least one pane is
       pending) lights it up with the accent colour + pulse animation. */
    #pending-bell {
      display: inline-flex; position: fixed; z-index: 9999;
      top: 20px; right: 20px;
      width: 56px; height: 56px;
      border-radius: 50%;
      align-items: center; justify-content: center;
      background: var(--bg-elev); color: var(--text-dim);
      border: 2px solid var(--border-strong);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      opacity: 0.55;
      cursor: grab; user-select: none;
      /* Without this, mobile browsers intercept the drag as a page pan and
         our pointermove never fires. */
      touch-action: none;
      transition: opacity 180ms, background-color 180ms, color 180ms, border-color 180ms, box-shadow 180ms;
    }
    #pending-bell:hover { opacity: 0.85; }
    #pending-bell.visible {
      opacity: 1;
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.22);
      animation: pending-row 2.4s ease-in-out infinite;
    }
    #pending-bell.dragging {
      cursor: grabbing;
      animation: none;
      transition: none;
      box-shadow: 0 8px 22px rgba(0,0,0,0.28);
    }
    #pending-bell .bell-icon {
      font-size: 24px; line-height: 1;
      /* The glyph itself shouldn't eat pointer events — every mousedown
         should land on #pending-bell directly so the drag handler wins. */
      pointer-events: none;
    }
    #pending-bell .dot { display: none; }
    #pending-count {
      position: absolute; bottom: -4px; right: -4px;
      min-width: 20px; height: 20px; padding: 0 5px;
      box-sizing: border-box; border-radius: 999px;
      background: var(--accent); color: #fff;
      border: 2px solid var(--bg-elev);
      font-size: 11px; font-weight: 700; line-height: 1;
      display: none; align-items: center; justify-content: center;
      pointer-events: none;
    }
    /* Only show the count badge when there's actually something pending. */
    #pending-bell.visible #pending-count { display: inline-flex; }
    .pane-meta { font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pane-path {
      font-size: 11px; color: var(--text-dim); margin-top: 2px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      direction: rtl; text-align: left; unicode-bidi: plaintext;
    }
    .host-label {
      padding: 10px 14px 4px; font-size: 11px; font-weight: 600;
      color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
    #toolbar {
      display: flex; gap: 8px; align-items: center;
      padding: 6px 10px; border-bottom: 1px solid var(--border);
      background: var(--bg-elev); font-size: 12px; color: var(--text-dim);
    }
    #toolbar button {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 4px;
      padding: 3px 9px; font-size: 12px; cursor: pointer;
    }
    #toolbar button:hover { background: #f0e2c2; }
    .zoom-group { display: inline-flex; align-items: center; gap: 5px; }
    .zoom-label {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.05em; margin-right: 2px;
    }
    .zoom-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
    #term-zoom-val, #ui-zoom-val {
      min-width: 42px; text-align: center; font-variant-numeric: tabular-nums;
    }
    #term-wrap {
      flex: 1; background: var(--term-bg); min-height: 0;
      overflow: hidden; padding: 6px;
    }
    #term { display: block; image-rendering: pixelated; cursor: text; }
    #toast {
      position: fixed; right: 18px; bottom: 18px;
      background: rgba(58, 46, 31, 0.92); color: var(--bg-elev);
      padding: 8px 14px; border-radius: 6px;
      font-size: 12px; font-weight: 500;
      opacity: 0; transform: translateY(8px);
      transition: opacity 160ms, transform 160ms;
      /* Drag-enabled: auto pointer-events so mouse can grab it.
         JS clamps to viewport and persists position in localStorage.
         Double-click resets to the default bottom-right corner. */
      pointer-events: auto; z-index: 200;
      user-select: none; cursor: move;
    }
    #toast.visible { opacity: 1; transform: translateY(0); }
    #empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 13px;
    }

    #input-bar {
      border-top: 1px solid var(--border); padding: 12px 14px 14px;
      background: var(--bg-elev);
      display: flex; flex-direction: column; gap: 10px;
    }
    .key-row {
      display: flex; gap: 6px; align-items: center;
    }
    .key-row-label {
      font-size: 11px; color: var(--text-dim); margin-right: 4px;
      letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600;
    }
    .key-row-sep {
      width: 1px; align-self: stretch; background: var(--border);
      margin: 2px 4px;
    }
    .key-btn {
      background: #fff; color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 6px;
      padding: 0 10px; height: 36px; width: 56px; box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px; line-height: 1; cursor: pointer; user-select: none;
      display: inline-flex; align-items: center; justify-content: center;
      flex: 0 0 auto;
      transition: background 80ms, border-color 80ms, box-shadow 80ms;
      box-shadow: 0 1px 0 rgba(16, 22, 45, 0.04);
    }
    .key-btn:hover   { background: #f0e2c2; border-color: var(--accent); }
    .key-btn:active  { background: var(--accent-soft); transform: translateY(1px); box-shadow: none; }
    .key-btn:disabled { background: #f1f2f5; color: #aaa; cursor: not-allowed; border-color: var(--border); box-shadow: none; }
    .key-btn.primary {
      background: #1e6fb4; color: #fff; border-color: #1e6fb4;
      font-family: inherit; font-weight: 600; width: 88px; margin-left: auto;
    }
    .key-btn.primary:hover { background: #175a93; border-color: #175a93; }
    .key-btn.primary:disabled { background: #cbd0dc; color: #eef0f5; border-color: #cbd0dc; }
    .key-btn.danger {
      background: var(--accent); color: #fff; border-color: var(--accent);
      font-family: inherit; font-weight: 600; width: 88px;
    }
    .key-btn.danger:hover { background: #a33c0d; border-color: #a33c0d; }
    .key-btn.danger:disabled { background: #cbd0dc; color: #eef0f5; border-color: #cbd0dc; }
    .text-row {
      display: flex;
    }
    #input {
      flex: 1; width: 100%; background: #ffffff; color: var(--text);
      border: 1px solid var(--border-strong); border-radius: 8px;
      padding: 12px 14px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 15px; line-height: 1.5; resize: vertical;
      min-height: 96px; max-height: 360px;
      outline: none;
      caret-color: var(--accent);
      transition: border-color 100ms, box-shadow 100ms;
      box-shadow: inset 0 1px 0 rgba(16, 22, 45, 0.02);
    }
    #input::placeholder { color: #9aa0ad; }
    #input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .hint { font-size: 11px; color: var(--text-dim); padding: 0 10px 8px; background: var(--bg-elev); }

    /* Hamburger + drawer overlay. Hidden on desktop; revealed by the
       media query below on narrow screens. */
    #mobile-menu-btn {
      display: none;
      position: fixed; top: 10px; left: 10px; z-index: 90;
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--bg-elev); color: var(--text);
      border: 1px solid var(--border-strong);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 18px; line-height: 1; cursor: pointer;
      align-items: center; justify-content: center;
    }
    #sidebar-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(20, 24, 35, 0.45);
      z-index: 108;
    }
    #sidebar-backdrop.visible { display: block; }

    @media (max-width: 720px) {
      /* Sidebar turns into a slide-in drawer so the terminal gets the
         full viewport width. */
      #sidebar {
        position: fixed; top: 0; bottom: 0; left: 0;
        z-index: 110; width: 86vw; max-width: 320px;
        transform: translateX(-100%);
        transition: transform 180ms ease;
        box-shadow: 2px 0 18px rgba(0,0,0,0.25);
      }
      #sidebar.open { transform: translateX(0); }
      #main { width: 100%; min-width: 0; }
      #mobile-menu-btn { display: inline-flex; }

      /* Push content down so the hamburger doesn't overlap. */
      #empty, #toolbar { padding-left: 58px; }
      #empty { padding-right: 12px; }

      /* Toolbar: many buttons — let them wrap, drop noisy chrome. */
      #toolbar {
        flex-wrap: wrap; gap: 6px; padding: 6px 8px 6px 58px;
      }
      #toolbar .zoom-sep,
      #toolbar .hint { display: none; }

      /* Input bar: smaller textarea + keys so the on-screen keyboard
         doesn't eat the terminal. */
      #input-bar { padding: 8px 10px 10px; gap: 8px; }
      #input {
        min-height: 52px; max-height: 30vh;
        padding: 8px 10px; font-size: 15px;
      }
      .key-row { flex-wrap: wrap; gap: 6px; }
      .key-btn {
        height: 36px; width: auto; min-width: 44px; padding: 0 10px;
        font-size: 13px;
      }
      .key-btn.primary, .key-btn.danger { width: 72px; margin-left: 0; }

      /* Pending bell sits just below the hamburger to avoid collision. */
      #pending-bell { top: 12px; right: 12px; }
    }

    /* Disable double-tap-to-zoom / pinch scroll on the terminal canvas
       so the browser lets our swipe/wheel handlers act on it. */
    #term-wrap { touch-action: none; }
  </style>
</head>
<body>
  <button id="mobile-menu-btn" aria-label="Show pane list" title="Show pane list">&#9776;</button>
  <div id="sidebar-backdrop"></div>
  <aside id="sidebar">
    <header>
      <span class="head-left">
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" aria-label="navi">
          <defs>
            <radialGradient id="navi-glow-outer" cx="50%" cy="50%" r="50%">
              <stop offset="0%"   stop-color="#a8e6ff" stop-opacity="0.5"/>
              <stop offset="50%"  stop-color="#5bc0f7" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#5bc0f7" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="navi-glow-inner" cx="50%" cy="50%" r="50%">
              <stop offset="0%"   stop-color="#d4f0ff" stop-opacity="0.6"/>
              <stop offset="70%"  stop-color="#7ecef4" stop-opacity="0.2"/>
              <stop offset="100%" stop-color="#5bc0f7" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="navi-core" cx="42%" cy="38%" r="55%">
              <stop offset="0%"   stop-color="#ffffff"/>
              <stop offset="35%"  stop-color="#d8f2ff"/>
              <stop offset="70%"  stop-color="#7ecef4"/>
              <stop offset="100%" stop-color="#3a9fd8"/>
            </radialGradient>
            <linearGradient id="navi-wingL" x1="0%" y1="20%" x2="80%" y2="100%">
              <stop offset="0%"   stop-color="#e8f8ff" stop-opacity="0.95"/>
              <stop offset="50%"  stop-color="#a8e6ff" stop-opacity="0.75"/>
              <stop offset="100%" stop-color="#5bc0f7" stop-opacity="0.4"/>
            </linearGradient>
            <linearGradient id="navi-wingR" x1="100%" y1="20%" x2="20%" y2="100%">
              <stop offset="0%"   stop-color="#e8f8ff" stop-opacity="0.95"/>
              <stop offset="50%"  stop-color="#a8e6ff" stop-opacity="0.75"/>
              <stop offset="100%" stop-color="#5bc0f7" stop-opacity="0.4"/>
            </linearGradient>
            <filter id="navi-softglow"><feGaussianBlur stdDeviation="8"/></filter>
            <filter id="navi-blur"><feGaussianBlur stdDeviation="3"/></filter>
          </defs>
          <circle cx="100" cy="100" r="95" fill="url(#navi-glow-outer)" filter="url(#navi-softglow)"/>
          <circle cx="100" cy="100" r="65" fill="url(#navi-glow-inner)"/>
          <path d="M82 90 Q58 50 18 22 Q10 28 14 42 Q20 62 38 80 Q56 94 82 98Z"
                fill="url(#navi-wingL)" stroke="#80ccee" stroke-width="0.8"/>
          <path d="M80 92 Q52 58 22 30" fill="none" stroke="#b0e4ff" stroke-width="0.5" opacity="0.6"/>
          <path d="M78 94 Q56 72 36 58" fill="none" stroke="#b0e4ff" stroke-width="0.4" opacity="0.4"/>
          <path d="M76 96 Q60 82 48 74" fill="none" stroke="#b0e4ff" stroke-width="0.3" opacity="0.3"/>
          <path d="M82 110 Q56 126 24 162 Q20 170 30 164 Q50 146 68 128 Q80 114 83 110Z"
                fill="url(#navi-wingL)" stroke="#80ccee" stroke-width="0.6" opacity="0.85"/>
          <path d="M80 112 Q54 134 30 158" fill="none" stroke="#b0e4ff" stroke-width="0.4" opacity="0.4"/>
          <path d="M78 114 Q58 132 44 146" fill="none" stroke="#b0e4ff" stroke-width="0.3" opacity="0.3"/>
          <path d="M118 90 Q142 50 182 22 Q190 28 186 42 Q180 62 162 80 Q144 94 118 98Z"
                fill="url(#navi-wingR)" stroke="#80ccee" stroke-width="0.8"/>
          <path d="M120 92 Q148 58 178 30" fill="none" stroke="#b0e4ff" stroke-width="0.5" opacity="0.6"/>
          <path d="M122 94 Q144 72 164 58" fill="none" stroke="#b0e4ff" stroke-width="0.4" opacity="0.4"/>
          <path d="M124 96 Q140 82 152 74" fill="none" stroke="#b0e4ff" stroke-width="0.3" opacity="0.3"/>
          <path d="M118 110 Q144 126 176 162 Q180 170 170 164 Q150 146 132 128 Q120 114 117 110Z"
                fill="url(#navi-wingR)" stroke="#80ccee" stroke-width="0.6" opacity="0.85"/>
          <path d="M120 112 Q146 134 170 158" fill="none" stroke="#b0e4ff" stroke-width="0.4" opacity="0.4"/>
          <path d="M122 114 Q142 132 156 146" fill="none" stroke="#b0e4ff" stroke-width="0.3" opacity="0.3"/>
          <circle cx="100" cy="100" r="20" fill="url(#navi-core)" filter="url(#navi-blur)"/>
          <circle cx="100" cy="100" r="16" fill="url(#navi-core)"/>
          <ellipse cx="93" cy="93" rx="6" ry="4.5" fill="#ffffff" opacity="0.85" transform="rotate(-20 93 93)"/>
          <circle cx="104" cy="89" r="2.2" fill="#ffffff" opacity="0.55"/>
        </svg>
        <h1>Claude Panes</h1>
      </span>
      <span class="head-right">
        <span id="conn">connecting…</span>
      </span>
    </header>
    <div id="pending-bell" title="Approvals are waiting — drag to move, click to jump">
      <span class="bell-icon">&#9873;</span>
      <span class="dot"></span>
      <span id="pending-count">0</span>
    </div>
    <div id="panes-list"></div>
  </aside>
  <div id="modal-backdrop">
    <div id="modal">
      <h2>New claude window (in <code>cc</code> session)</h2>
      <label style="display:none">Host
        <select id="new-host"></select>
      </label>
      <label>Working directory
        <input id="new-cwd" type="text" placeholder="/absolute/path" spellcheck="false">
      </label>
      <label>Window name <span style="opacity:0.6">(optional, defaults to directory name)</span>
        <input id="new-session" type="text" placeholder="e.g. navi" spellcheck="false">
      </label>
      <div class="error" id="new-error"></div>
      <div class="row">
        <button id="new-cancel">Cancel</button>
        <button id="new-submit" class="primary">Launch</button>
      </div>
    </div>
  </div>
  <main id="main">
    <div id="empty">Select a pane on the left.</div>
    <div id="toolbar" style="display:none">
      <span class="zoom-group">
        <span class="zoom-label">Term</span>
        <button id="term-zoom-out" title="Terminal smaller">−</button>
        <span id="term-zoom-val">100%</span>
        <button id="term-zoom-in" title="Terminal bigger">+</button>
        <button id="term-zoom-reset" title="Reset terminal zoom">RESET</button>
      </span>
      <span class="zoom-sep"></span>
      <span class="zoom-group">
        <span class="zoom-label">UI</span>
        <button id="ui-zoom-out" title="UI smaller">−</button>
        <span id="ui-zoom-val">100%</span>
        <button id="ui-zoom-in" title="UI bigger">+</button>
        <button id="ui-zoom-reset" title="Reset UI zoom">RESET</button>
      </span>
      <span class="zoom-sep"></span>
      <button id="fit-btn" title="Resize tmux pane to match the browser viewport">FIT PANE</button>
      <button id="copy-btn" title="Copy selection (or whole screen if nothing is selected)">COPY</button>
      <button id="page-up-btn"   title="Scroll up one page (PageUp / Shift+wheel)">&uarr; PGUP</button>
      <button id="page-down-btn" title="Scroll down one page (PageDown / Shift+wheel)">&darr; PGDN</button>
      <button id="new-pane-btn" title="Launch a new claude session on a host">+ NEW</button>
      <button id="kill-btn" title="Kill the active tmux window" disabled>DELETE</button>
      <button id="exit-scroll-btn" title="Leave tmux copy-mode and jump back to live" style="display:none">EXIT SCROLL</button>
      <span style="flex:1"></span>
      <span class="hint" style="background:transparent;padding:0">Double-click a pane name to rename.</span>
    </div>
    <div id="term-wrap" style="display:none"><canvas id="term"></canvas></div>
    <div id="input-bar">
      <div class="key-row">
        <button class="key-btn" data-key="Up"     title="Up arrow"      disabled>↑</button>
        <button class="key-btn" data-key="Down"   title="Down arrow"    disabled>↓</button>
        <button class="key-btn" data-key="Escape" title="Esc"           disabled>Esc</button>
        <button class="key-btn" data-key="Tab"    title="Tab"           disabled>Tab</button>
        <button class="key-btn" data-key="BTab"   title="Shift+Tab"     disabled>⇧Tab</button>
        <button class="key-btn" data-key="BSpace" title="Backspace"     disabled>⌫</button>
        <button class="key-btn" id="clear-input-btn" title="Clear textarea" disabled>CLEAR</button>
        <button class="key-btn" data-key="/"      title="Slash command" disabled>/</button>
        <button class="key-btn" data-key="C-o"    title="Ctrl+O"        disabled>^O</button>
        <button class="key-btn primary" data-key="Enter" title="Enter"  disabled>Enter</button>
        <button id="send" class="key-btn danger" disabled>Send</button>
      </div>
      <div class="text-row">
        <textarea id="input" rows="4" placeholder="Select a pane, then type a message…" disabled></textarea>
      </div>
    </div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
